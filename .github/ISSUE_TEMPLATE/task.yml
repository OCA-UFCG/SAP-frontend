name: Task
description: Create a new task
title: "[TASK] "
labels: ["task"]

body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: Describe the task and its purpose.
      placeholder: |
        Example:
        Implement user authentication using JWT.
        The system must validate credentials and return an access token.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Provide any relevant information, references, links, or technical details.
      placeholder: |
        - Related User Story: #123
        - API Documentation: https://...
        - Design Mockup: https://...

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define the acceptance criteria for this task.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any additional observations or implementation details.
      placeholder: Add any relevant notes here...
